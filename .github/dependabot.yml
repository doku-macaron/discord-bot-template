version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      bun-runtime:
        patterns:
          - "@types/bun"
      drizzle:
        patterns:
          - "drizzle-*"
          - "discord.js"
      lint-and-format:
        patterns:
          - "@biomejs/biome"
          - "typescript"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
