name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version:
          - "1.3.11"
          - latest
    name: Check Bun ${{ matrix.bun-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome
        run: bun run check:no-save

      - name: TypeScript
        run: bun run check:tsc

      - name: Test
        run: bun test

  docker:
    runs-on: ubuntu-latest
    name: Docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compose config
        env:
          TOKEN: dummy
          CLIENT_ID: dummy
        run: |
          docker compose config
          docker compose --profile tools config

      - name: Docker build
        run: docker build -t discord-bot-template:ci .
